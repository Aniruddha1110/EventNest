# ─── Test Configuration ────────────────────────────────────────────────────────
# Minimal config for unit tests — no real database connections required.
# Activated via @ActiveProfiles("test") on @SpringBootTest classes.

# Disable Oracle DataSource auto-config (not needed for unit tests)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# JWT test values
jwt.secret=TestSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!
jwt.expiration=86400000

# Disable mail
spring.mail.host=localhost
spring.mail.port=25

# Logging — quiet
logging.level.root=WARN
