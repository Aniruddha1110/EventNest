spring.application.name=eventsphere-backend

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=9090

# ?? Oracle 26ai Free DataSource ?????????????????????????????????????????????????
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=eventsphere
spring.datasource.password=es020711
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
# OracleDialect auto-detects the correct Oracle version at runtime.
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# validate = Hibernate checks your entity fields match the DB columns exactly.
# Use create-drop only during initial dev, never against your real Oracle DB.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? H2 In-Memory (fake bank ? secondary datasource) ??????????????????????????
bank.datasource.url=jdbc:h2:mem:fakebank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
bank.datasource.driver-class-name=org.h2.Driver
bank.datasource.username=sa
bank.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=eventsphere-jwt-secret-key-minimum-256-bits-long-for-hs256-algorithm
jwt.expiration=86400000

# ── OAuth2 — Google Login ──────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# ── OAuth2 — GitHub Login ──────────────────────────────────────────────────────
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=user:email

